version: '3'

tasks:
  install:
    desc: Install orchestration service dependencies
    dir: orchestration_service
    cmds:
      - poetry install

  run:
    desc: Run orchestration service (port 8081)
    dir: orchestration_service
    cmds:
      - PYTHONPATH=.. poetry run uvicorn orchestration_service.main:app --host 0.0.0.0 --port 8081 --reload

  health:
    desc: Check orchestration service health
    cmds:
      - curl http://localhost:8081/health

  test:
    desc: Run orchestration service tests
    dir: orchestration_service
    cmds:
      - poetry run pytest
